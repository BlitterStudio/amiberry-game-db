name: Sync WHDLoad Database

on:
  schedule:
    # Run daily at 08:00 UTC (after Horace's 07:00 UTC build)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_db: ${{ steps.check.outputs.has_db }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download upstream XML
        run: |
          curl -sL -o /tmp/whdload_db.xml \
            "https://raw.githubusercontent.com/HoraceAndTheSpider/Amiberry-XML-Builder/master/whdload_db.xml"
          echo "XML size: $(wc -c < /tmp/whdload_db.xml) bytes"
          echo "Game count: $(grep -c '<game ' /tmp/whdload_db.xml)"

      - name: Convert XML to JSON
        run: |
          python3 converter/xml_to_json.py /tmp/whdload_db.xml whdload_db.json
          rm -f whdload_db.pretty.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whdload_db.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            GAME_COUNT=$(python3 -c "import json; print(json.load(open('whdload_db.json'))['game_count'])")
            git commit -m "sync: update WHDLoad database (${GAME_COUNT} games)"
            git push
          fi

      - name: Check DB exists
        id: check
        run: |
          if [ -f whdload_db.json ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: sync
    if: needs.sync.outputs.has_db == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp whdload_db.json _site/
          cp schema/whdload_db.schema.json _site/
          echo '{"status":"ok","file":"whdload_db.json"}' > _site/index.json

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v5
        id: deployment
