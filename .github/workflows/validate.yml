name: Validate Database

on:
  pull_request:
    paths:
      - 'whdload_db.json'
      - 'schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate JSON against schema
        run: |
          python3 -c "
          import json, jsonschema
          with open('whdload_db.json') as f:
              data = json.load(f)
          with open('schema/whdload_db.schema.json') as f:
              schema = json.load(f)
          jsonschema.validate(data, schema)
          print(f'Valid: {data[\"game_count\"]} games')
          "
